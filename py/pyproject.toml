[tool.uv.workspace]
members = ["ptrack_analytics", "ptrack_py"]

[dependency-groups]
dev = [
    "ruff>=0.15.12",
    "ty>=0.0.33",
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ty.environment]
python = ".venv"

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]
